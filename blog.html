    <!-- Blog Loader Script -->
    <script>
      function toggleMenu() {
        document.getElementById("nav-links").classList.toggle("active");
      }

      const blogGrid = document.getElementById("blog-grid");
      const searchInput = document.getElementById("blogSearch");
      const categorySelect = document.getElementById("blogCategory");

      let posts = [];

      fetch("blog-data.json?v=6")
        .then((res) => res.json())
        .then((data) => {
          posts = data.reverse();
          renderPosts(posts);
        });

      function renderPosts(postList) {
        blogGrid.innerHTML = "";
        postList.forEach((post) => {
          const card = document.createElement("div");
          card.className = "card post";
          card.style.cssText = "background: #16181d; border: 1px solid #1f2229; border-radius: 12px; padding: 1.5rem; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 100%;";
          card.onclick = () => window.location.href = post.slug;
          
          card.innerHTML = `
            <div>
              <div style="display: flex; gap: 8px; margin-bottom: 12px; align-items: center;">
                <span style="color: #00d4ff; background: rgba(0, 212, 255, 0.1); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;">${post.category}</span>
                <span style="color: #666; font-size: 0.75rem;">${post.date}</span>
              </div>
              <h3 style="color: #fff; font-size: 1.25rem; margin-bottom: 0.8rem; line-height: 1.3; font-weight: 700;">${post.title}</h3>
              <p style="color: #9ca3af; font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem;">${post.summary}</p>
            </div>
            <a href="${post.slug}" style="color: #00d4ff; text-decoration: none; font-weight: 700; font-size: 0.9rem;">Read Full Insight →</a>
          `;
          blogGrid.appendChild(card);
        });
      }

      function filterBlogs() {
        const search = searchInput.value.toLowerCase();
        const category = categorySelect.value;
        const filtered = posts.filter((post) => {
          const text = `${post.title} ${post.summary} ${post.category}`.toLowerCase();
          const matchesSearch = text.includes(search);
          const matchesCategory = category === "all" || post.category === category;
          return matchesSearch && matchesCategory;
        });
        renderPosts(filtered);
      }

      searchInput.addEventListener("input", filterBlogs);
      categorySelect.addEventListener("change", filterBlogs);
    </script>
